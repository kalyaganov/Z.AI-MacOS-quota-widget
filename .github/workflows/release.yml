name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build
        run: swift build -c release

      - name: Create DMG
        run: |
          mkdir -p dmg_temp
          cp .build/release/ZaiSubscriptionWidget dmg_temp/
          hdiutil create -volname "Z.AI Subscription Widget" \
            -srcfolder dmg_temp -ov -format UDZO \
            "ZaiSubscriptionWidget-${{ steps.version.outputs.VERSION }}.dmg"

      - name: Upload DMG
        uses: softprops/action-gh-release@v1
        with:
          files: ZaiSubscriptionWidget-${{ steps.version.outputs.VERSION }}.dmg
